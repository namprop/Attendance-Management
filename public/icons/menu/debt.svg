<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Viền tròn trắng đầy đủ -->
  <circle cx="50" cy="50" r="45" stroke="white" stroke-width="10" fill="none"></circle>
  
  <!-- Đoạn màu xanh (chỉ là một phần) -->
  <circle cx="50" cy="50" r="45" stroke="#009dff" stroke-width="10" fill="none" stroke-dasharray="90 270" stroke-dashoffset="60"></circle>
  
  <!-- Chữ DEBT ở giữa -->
  <text x="50%" y="55%" text-anchor="middle" fill="#009dff" font-size="18" font-family="Arial" dy=".3em">DEBT</text>
</svg>
